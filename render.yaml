services:
  - type: web
    name: palmleaves-transliteration
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp.app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ARCHIVES_SECRET
        generateValue: true
    disk:
      name: models
      mountPath: /opt/render/project/src/models
      sizeGB: 1
